<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pdf/extractor</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="layout">
      <aside id="sidebar">
        <section class="upload-zone" id="uploadZone">
          <div class="upload-inner">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="12" y1="18" x2="12" y2="12"/>
              <line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
            <p>drop .pdf or <label for="fileInput" class="browse-link">browse</label></p>
            <input type="file" id="fileInput" accept=".pdf" hidden />
          </div>
        </section>

        <div class="sidebar-header">
          <span class="sidebar-title">History</span>
          <div class="sidebar-header-actions">
            <button id="themeToggle" class="theme-toggle" title="Switch to light mode">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
            </button>
            <button id="clearHistory" class="clear-btn" title="Clear history">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>
            </button>
          </div>
        </div>
        <ul id="historyList" class="history-list">
          <li class="history-empty">No files yet</li>
        </ul>
      </aside>

      <div id="app">
        <header>
          <h1>pdf/extractor</h1>
          <p>extract text, tables &amp; structure</p>
        </header>

        <main>
          <div id="status" class="status hidden"></div>

          <section id="results" class="results hidden">
            <div class="results-header">
              <h2 id="resultsFilename"></h2>
              <div class="results-actions">
                <div class="tabs">
                  <button class="tab active" data-tab="text">Text</button>
                  <button class="tab" data-tab="tables">Tables</button>
                  <button class="tab" data-tab="structure">Structure</button>
                  <button class="tab" data-tab="raw">Raw JSON</button>
                </div>
                <button id="copyBtn" class="copy-btn" title="Copy to clipboard">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                  </svg>
                  <span id="copyBtnLabel">Copy</span>
                </button>
              </div>
            </div>

            <div class="tab-content" id="tabText">
              <div id="textContent" class="text-content"></div>
            </div>
            <div class="tab-content hidden" id="tabTables">
              <div id="tablesContent"></div>
            </div>
            <div class="tab-content hidden" id="tabStructure">
              <div id="structureContent"></div>
            </div>
            <div class="tab-content hidden" id="tabRaw">
              <pre id="rawContent"></pre>
            </div>
          </section>
        </main>
      </div>
    </div>
    <!-- Confirm clear-all modal -->
    <div id="confirmModal" class="modal-backdrop hidden">
      <div class="modal">
        <p class="modal-message">Clear all history? This can't be undone.</p>
        <div class="modal-actions">
          <button id="modalCancel" class="modal-btn modal-btn-cancel">Cancel</button>
          <button id="modalConfirm" class="modal-btn modal-btn-danger">Clear all</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
